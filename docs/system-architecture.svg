<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Title -->
<text x="340" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">Microgrid system architecture</text>

<!-- Outer container -->
<rect x="20" y="46" width="640" height="460" rx="16" fill="none" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="6 4"/>

<!-- === GENERATION LAYER === -->
<text x="52" y="72" font-size="11" fill="#888780" font-weight="500">GENERATION</text>
<line x1="130" y1="68" x2="640" y2="68" stroke="#d3d1c7" stroke-width="0.3"/>

<!-- Solar PV -->
<rect x="80" y="86" width="200" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="180" y="107" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Solar PV array</text>
<text x="180" y="125" text-anchor="middle" font-size="12" fill="#0F6E56">Irradiance → power curve</text>

<!-- Diesel Gen -->
<rect x="400" y="86" width="220" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="510" y="107" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Diesel generator</text>
<text x="510" y="125" text-anchor="middle" font-size="12" fill="#0F6E56">Backup, fuel cost model</text>

<!-- Arrows: Sources → Bus -->
<line x1="180" y1="138" x2="180" y2="172" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="510" y1="138" x2="510" y2="172" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- === POWER BUS === -->
<rect x="60" y="176" width="560" height="26" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
<text x="340" y="193" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">AC / DC power bus</text>

<!-- === STORAGE + GRID LAYER === -->
<text x="52" y="236" font-size="11" fill="#888780" font-weight="500">STORAGE / GRID</text>
<line x1="142" y1="232" x2="640" y2="232" stroke="#d3d1c7" stroke-width="0.3"/>

<!-- Bus ↔ Grid (bidirectional) -->
<line x1="140" y1="202" x2="140" y2="250" stroke="#888780" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<!-- Main Grid -->
<rect x="60" y="254" width="160" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="140" y="275" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Main grid</text>
<text x="140" y="293" text-anchor="middle" font-size="12" fill="#5F5E5A">Import / export</text>

<!-- Bus ↔ Battery (bidirectional) -->
<line x1="400" y1="202" x2="400" y2="250" stroke="#888780" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<!-- Battery Storage -->
<rect x="300" y="254" width="200" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="400" y="275" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Battery storage</text>
<text x="400" y="293" text-anchor="middle" font-size="12" fill="#854F0B">SoC, charge / discharge</text>

<!-- === LOAD LAYER === -->
<text x="52" y="342" font-size="11" fill="#888780" font-weight="500">LOADS</text>
<line x1="86" y1="338" x2="640" y2="338" stroke="#d3d1c7" stroke-width="0.3"/>

<!-- Bus → Loads distribution lines -->
<line x1="260" y1="202" x2="260" y2="320" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="260" y1="320" x2="140" y2="320" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="140" y1="320" x2="140" y2="354" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="260" y1="320" x2="400" y2="320" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="400" y1="320" x2="400" y2="354" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Critical Loads -->
<rect x="60" y="358" width="160" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="140" y="379" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">Critical loads</text>
<text x="140" y="397" text-anchor="middle" font-size="12" fill="#993C1D">Clinic, water pump</text>

<!-- Flexible Loads -->
<rect x="300" y="358" width="200" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="400" y="379" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">Flexible loads</text>
<text x="400" y="397" text-anchor="middle" font-size="12" fill="#993C1D">EV charging, HVAC</text>

<!-- === EMS CONTROLLER === -->
<rect x="140" y="432" width="400" height="60" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="456" text-anchor="middle" font-size="14" font-weight="600" fill="#3C3489">EMS controller</text>
<text x="340" y="476" text-anchor="middle" font-size="12" fill="#534AB7">Dispatch algorithm — rule-based + optimization</text>

<!-- Control lines from EMS -->
<line x1="200" y1="432" x2="200" y2="418" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="3 3"/>
<line x1="200" y1="418" x2="56" y2="418" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="3 3"/>
<line x1="56" y1="418" x2="56" y2="280" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

<line x1="480" y1="432" x2="480" y2="418" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="3 3"/>
<line x1="480" y1="418" x2="524" y2="418" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="3 3"/>
<line x1="524" y1="418" x2="524" y2="280" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

<line x1="440" y1="432" x2="440" y2="412" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

<line x1="340" y1="432" x2="340" y2="418" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="3 3"/>
<line x1="340" y1="418" x2="630" y2="418" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="3 3"/>
<line x1="630" y1="418" x2="630" y2="112" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

<!-- Legend -->
<line x1="540" y1="450" x2="568" y2="450" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="574" y="454" font-size="11" fill="#5F5E5A">Power flow</text>
<line x1="540" y1="470" x2="568" y2="470" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<text x="574" y="474" font-size="11" fill="#5F5E5A">Control signal</text>
</svg>
